<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#1cc88a,#4e73df);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            width:400px;
        }
    </style>
</head>
<body>

<div class="card">

    <h3 class="text-center mb-3">Crear Cuenta</h3>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-success w-100">
            Registrarse
        </button>
    </form>

    <hr>

    <p class="text-center">
        ¿Ya tienes cuenta?<br>
        <a href="{% url 'login' %}" class="btn btn-primary btn-sm mt-2">
            Iniciar sesión
        </a>
    </p>

</div>

</body>
</html>
