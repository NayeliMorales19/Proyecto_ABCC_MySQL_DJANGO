<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#4e73df,#1cc88a);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            width:350px;
        }
    </style>
</head>
<body>

<div class="card">

    <h3 class="text-center mb-3">Iniciar Sesión</h3>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-primary w-100">
            Entrar
        </button>
    </form>

    <hr>

    <p class="text-center">
        ¿No tienes cuenta?<br>
        <a href="{% url 'register' %}" class="btn btn-success btn-sm mt-2">
            Registrarse
        </a>
    </p>

</div>

</body>
</html>
