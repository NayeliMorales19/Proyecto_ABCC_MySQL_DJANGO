<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Editar Alumno</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">

<style>
body{
background: linear-gradient(135deg,#4e73df,#1cc88a);
min-height:100vh;
}

.navbar{
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.card-box{
background:white;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
padding:35px;
margin-top:40px;
}

.titulo{
font-weight:700;
color:#4e73df;
}

.form-label{
font-weight:600;
color:#555;
}

.form-control{
border-radius:10px !important;
height:45px;
}

.btn{
border-radius:10px;
font-weight:600;
}
</style>
</head>

<body>

<nav class="navbar navbar-dark bg-primary">
<div class="container">
<a class="navbar-brand fw-bold" href="{% url 'listar' %}">
<i class="bi bi-mortarboard-fill"></i> Sistema de Alumnos
</a>
</div>
</nav>

<div class="container">

<div class="card-box">

<h3 class="titulo mb-4">
<i class="bi bi-pencil-square"></i> Editar Alumno
</h3>

<form method="post" id="formEditar">
{% csrf_token %}

<div class="row g-3">

<div class="col-md-4">
<label class="form-label">Número de Control</label>
<input type="text" name="numControl" value="{{ object.numControl }}" class="form-control">
</div>

<div class="col-md-4">
<label class="form-label">Nombre</label>
<input type="text" name="Nombre" value="{{ object.Nombre }}" class="form-control">
</div>

<div class="col-md-4">
<label class="form-label">Primer Apellido</label>
<input type="text" name="primerAp" value="{{ object.primerAp }}" class="form-control">
</div>

<div class="col-md-4">
<label class="form-label">Segundo Apellido</label>
<input type="text" name="segundoAp" value="{{ object.segundoAp }}" class="form-control">
</div>

<div class="col-md-4">
<label class="form-label">Fecha de Nacimiento</label>
<input type="date" name="fechaNac" value="{{ object.fechaNac|date:'Y-m-d' }}" class="form-control">
</div>

<div class="col-md-2">
<label class="form-label">Semestre</label>
<input type="number" name="semestre" value="{{ object.semestre }}" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label">Carrera</label>
<input type="text" name="carrera" value="{{ object.carrera }}" class="form-control">
</div>

</div>

<div class="mt-4 d-flex gap-3">

<button type="button" onclick="confirmarEdicion()" class="btn btn-warning w-100">
<i class="bi bi-save"></i> Actualizar
</button>

<a href="{% url 'listar' %}" class="btn btn-secondary w-100">
<i class="bi bi-x-circle"></i> Cancelar
</a>

</div>

</form>

</div>

</div>

<!-- SWEETALERT -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- 🔥 CONFIRMAR EDICIÓN -->
<script>
function confirmarEdicion(){
    Swal.fire({
        title: '¿Guardar cambios?',
        text: 'Se actualizará la información del alumno',
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#ffc107',
        cancelButtonColor: '#6c757d',
        confirmButtonText: 'Sí, actualizar'
    }).then((result) => {
        if (result.isConfirmed){
            document.getElementById('formEditar').submit();
        }
    });
}
</script>

<!-- 🔥 ALERTA DESPUÉS DE EDITAR -->
{% if messages %}
<script>
window.onload = function(){
    {% for message in messages %}
    Swal.fire({
        icon: 'success',
        title: 'Actualizado',
        text: '{{ message }}',
        confirmButtonColor: '#28a745'
    }).then(() => {
        window.location.href = "{% url 'listar' %}";
    });
    {% endfor %}
}
</script>
{% endif %}

</body>
</html>
